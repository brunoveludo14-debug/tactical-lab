<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>São Manços — Análise ao Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com"    crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<div id="app">

<!-- ── HEADER ──────────────────────────────────────────── -->
<header id="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <span class="logo-name">São Manços — Análise ao Vivo</span>
  </div>
  <div class="vsep"></div>
  <a href="tactical.html" class="topbar-link">⚽ Tactical Lab</a>
  <span id="offline-status" class="offline-badge" style="display:none">Offline</span>
</header>

<!-- ── MAIN ────────────────────────────────────────────── -->
<main id="main-content">

  <!-- Stats Header -->
  <div class="stats-header">
    <div class="timer-block">
      <div id="timer-display" class="timer-display">00:00</div>
      <div class="timer-controls">
        <button id="btn-timer-play"  class="btn btn-start" aria-label="Iniciar">▶</button>
        <button id="btn-timer-pause" class="btn btn-pause" aria-label="Pausar"  style="display:none">⏸</button>
        <button id="btn-timer-reset"  class="btn btn-reset"  aria-label="Reiniciar">⟲</button>
      </div>
    </div>
    <div class="parte-toggle">
      <button class="parte-btn active" id="btn-1p">1ªP</button>
      <button class="parte-btn"        id="btn-2p">2ªP</button>
    </div>
    <div class="score-inputs">
      <input id="score-home" type="number" min="0" max="99" value="0" class="score-input" aria-label="Equipa casa">
      <span class="score-sep">—</span>
      <input id="score-away" type="number" min="0" max="99" value="0" class="score-input" aria-label="Equipa visitante">
    </div>
    <button class="btn btn-outline" onclick="window.AppState?.exportExcel()">📥 Excel</button>
    <button class="btn btn-outline" onclick="window.AppState?.saveMatchToHistory()">💾 Guardar</button>
  </div>

  <!-- Stats Grid -->
  <div id="stats-grid">
    <div class="card">
      <div class="card-title">📊 Eficácia</div>
      <div id="stats-summary"></div>
    </div>
    <div class="card">
      <div class="card-title">🔥 Mapa de Calor</div>
      <div id="heatmap-panel"></div>
    </div>
    <div class="card">
      <div class="card-title">⚡ Ações por Tipo</div>
      <div class="stats-filter-row">
        <button class="filter-btn active" id="filter-all">Tudo</button>
        <button class="filter-btn"        id="filter-1p">1ªP</button>
        <button class="filter-btn"        id="filter-2p">2ªP</button>
      </div>
      <div id="actions-grid"></div>
    </div>
    <div class="card">
      <div class="card-title">🏆 Top Jogadores</div>
      <div id="top-players-list"></div>
    </div>
  </div>

  <!-- Players + Opponent -->
  <div class="players-opp-row">
    <div class="card">
      <div class="card-title">👥 Plantel — São Manços</div>
      <div id="players-panel"></div>
    </div>
    <div class="card">
      <div class="card-title">⚔ Adversário</div>
      <div id="opp-panel"></div>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="card-title">📋 Registo de Jogo</div>
    <div class="history-controls">
      <select id="history-filter" class="history-select">
        <option value="all">Todas</option>
        <option value="Passe">Passe</option>
        <option value="Remate">Remate</option>
        <option value="Golo">Golo</option>
        <option value="Desarme">Desarme</option>
        <option value="Perda">Perda</option>
        <option value="Falta">Falta</option>
      </select>
      <button class="btn btn-sm" onclick="window.AppState?.clearAll()">🗑 Limpar Tudo</button>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>

</main>

<!-- TOAST -->
<div id="toast" class="toast" role="alert" aria-live="polite"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js?v=34"></script>
</body>
</html>
