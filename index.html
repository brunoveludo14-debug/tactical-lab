<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>São Manços — Análise ao Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com"    crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<div id="app">

<!-- ── HEADER ──────────────────────────────────────────── -->
<header id="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <span class="logo-name">São Manços — Análise ao Vivo</span>
  </div>
  <div class="vsep"></div>
  <a href="tactical.html" class="topbar-link">⚽ Tactical Lab</a>
  <span id="offline-status" class="offline-badge" style="display:none">Offline</span>
</header>

<!-- ── MAIN ────────────────────────────────────────────── -->
<main id="main-content">

  <!-- STATS HEADER -->
  <div class="stats-header">
    <div class="timer-block">
      <div id="timer-display" class="timer-display">00:00</div>
      <div class="timer-controls">
        <button id="btn-start" class="btn btn-start" aria-label="Iniciar">▶</button>
        <button id="btn-pause" class="btn btn-pause" aria-label="Pausar" style="display:none">⏸</button>
        <button id="btn-reset" class="btn btn-reset" aria-label="Reiniciar">⟲</button>
      </div>
    </div>
    <div class="parte-toggle">
      <button class="parte-btn active" id="btn-1p">1ªP</button>
      <button class="parte-btn"        id="btn-2p">2ªP</button>
    </div>
    <div class="score-inputs">
      <input id="score-home" type="number" min="0" max="99" value="0" class="score-input" aria-label="Equipa casa">
      <span class="score-sep">—</span>
      <input id="score-away" type="number" min="0" max="99" value="0" class="score-input" aria-label="Equipa visitante">
    </div>
    <button class="btn btn-outline" onclick="AppState?.exportExcel()">📥 Excel</button>
    <button class="btn btn-outline" onclick="saveMatch()">💾 Guardar</button>
  </div>

  <!-- STATS GRID -->
  <div id="stats-grid">

    <div class="card">
      <div class="card-title">📊 Eficácia</div>
      <div id="stats-summary"></div>
    </div>

    <div class="card">
      <div class="card-title">🔥 Mapa de Calor</div>
      <div id="heatmap-panel"></div>
    </div>

    <div class="card">
      <div class="card-title">⚡ Ações por Tipo</div>
      <div class="stats-filter-row">
        <button class="filter-btn active" id="filter-all">Tudo</button>
        <button class="filter-btn"        id="filter-1p">1ªP</button>
        <button class="filter-btn"        id="filter-2p">2ªP</button>
      </div>
      <div id="actions-grid"></div>
    </div>

    <div class="card">
      <div class="card-title">🏆 Top Jogadores</div>
      <div id="top-players-list"></div>
    </div>

  </div>

  <!-- JOGADORES + ADVERSÁRIO -->
  <div class="players-opp-row">

    <div class="card">
      <div class="card-title">👥 Plantel — São Manços</div>
      <div id="players-panel"></div>
    </div>

    <div class="card">
      <div class="card-title">⚔ Adversário</div>
      <div id="opp-panel"></div>
    </div>

  </div>

  <!-- HISTÓRICO -->
  <div class="card">
    <div class="card-title">📋 Registo de Jogo</div>
    <div class="history-controls">
      <select id="history-filter" class="history-select">
        <option value="all">Todas</option>
        <option value="Passe">Passe</option>
        <option value="Remate">Remate</option>
        <option value="Golo">Golo</option>
        <option value="Desarme">Desarme</option>
        <option value="Perda">Perda</option>
        <option value="Falta">Falta</option>
      </select>
      <button class="btn btn-sm" onclick="AppState?.clearAll()">🗑 Limpar Tudo</button>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>

</main>

<!-- TOAST -->
<div id="toast" class="toast" role="alert" aria-live="polite"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js"></script>
<script>
// ══ BRIDGE: Liga o index.html ao AppState do app.js ══════════

// Bindings de timer
document.getElementById('btn-start')?.addEventListener('click', () => {
  if (!AppState?.isRunning) AppState?.toggleTimer();
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-pause').style.display = '';
});
document.getElementById('btn-pause')?.addEventListener('click', () => {
  if (AppState?.isRunning) AppState?.toggleTimer();
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('btn-start').style.display = '';
});
document.getElementById('btn-reset')?.addEventListener('click', () => {
  AppState?.resetTimer();
  document.getElementById('btn-start').style.display = '';
  document.getElementById('btn-pause').style.display = 'none';
});

// Toggle parte
document.getElementById('btn-1p')?.addEventListener('click', () => AppState?.setHalf(1));
document.getElementById('btn-2p')?.addEventListener('click', () => AppState?.setHalf(2));

// Filtro stats
document.getElementById('filter-all')?.addEventListener('click', () => AppState?.setStatFilter('all'));
document.getElementById('filter-1p')?.addEventListener('click', () => AppState?.setStatFilter(1));
document.getElementById('filter-2p')?.addEventListener('click', () => AppState?.setStatFilter(2));

// Histórico filter
document.getElementById('history-filter')?.addEventListener('change', () => AppState?.renderMatchHistory());

// Guardar sessão
function saveMatch() {
  const match = {
    date: new Date().toISOString(),
    scoreHome: document.getElementById('score-home')?.value || 0,
    scoreAway: document.getElementById('score-away')?.value || 0,
    half: localStorage.getItem('ls_half') || '1',
    logs: JSON.parse(localStorage.getItem('ls_logs') || '[]'),
    oppLogs: JSON.parse(localStorage.getItem('ls_opp_logs') || '[]')
  };
  const history = JSON.parse(localStorage.getItem('ls_history') || '[]');
  history.unshift(match);
  localStorage.setItem('ls_history', JSON.stringify(history.slice(0, 20)));
  AppState?.showToast('Sessão guardada!');
}

// Expor para app.js
window.saveMatch = saveMatch;
</script>
</body>
</html>
